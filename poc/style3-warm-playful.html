<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 3 — 暖橙活泼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fffbf7;
    --text: #1a1410;
    --text2: #8a7060;
    --accent: #e85d26;
    --accent2: #f5a623;
    --accent3: #ff8c5a;
    --surface: #fff;
    --border: #f0e8de;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    line-height: 1.6;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 3rem;
    background: var(--surface);
    border-bottom: 2px solid var(--text);
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 0;
  }

  nav a {
    text-decoration: none;
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  nav a:hover {
    border-color: var(--text);
    background: var(--text);
    color: var(--bg);
  }

  /* Hero */
  .hero {
    padding: 5rem 3rem;
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4rem;
    align-items: center;
  }

  .hero-text {}

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent2);
    color: var(--text);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.75rem;
    margin-bottom: 1.5rem;
    border: 2px solid var(--text);
  }

  .hero h1 {
    font-size: 3.25rem;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1.25rem;
  }

  .hero h1 .highlight {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }

  .hero h1 .highlight::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--accent2);
    z-index: -1;
  }

  .hero p {
    font-size: 1rem;
    color: var(--text2);
    max-width: 420px;
    margin-bottom: 2rem;
    line-height: 1.75;
  }

  .btn-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 600;
    border: 2px solid var(--text);
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .btn-outline {
    background: transparent;
    color: var(--text);
  }

  .btn-outline:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .hero-side {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 2px solid var(--text);
    padding: 1.25rem 1.5rem;
    min-width: 140px;
    position: relative;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 100%;
    height: 100%;
    background: var(--accent);
    z-index: -1;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text2);
    font-weight: 500;
  }

  /* Posts */
  .posts-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 3rem 5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .section-line {
    flex: 1;
    height: 2px;
    background: var(--text);
  }

  .view-all {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    padding: 0.3rem 0.75rem;
    border: 2px solid var(--text);
    transition: all 0.15s;
  }

  .view-all:hover {
    background: var(--text);
    color: var(--bg);
  }

  .post-list { display: flex; flex-direction: column; gap: 0; }

  .post-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.25rem;
    align-items: center;
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border: 2px solid var(--text);
    margin-bottom: -2px;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
    position: relative;
  }

  .post-item:hover {
    background: var(--accent);
    color: white;
    z-index: 1;
  }

  .post-item:hover .post-date,
  .post-item:hover .post-tag { color: rgba(255,255,255,0.8); }

  .post-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    transition: color 0.15s;
  }

  .post-item:hover .post-num { color: rgba(255,255,255,0.7); }

  .post-title {
    font-size: 0.975rem;
    font-weight: 600;
  }

  .post-tag {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .post-date {
    font-size: 0.75rem;
    color: var(--text2);
    grid-column: 2;
    transition: color 0.15s;
  }

  footer {
    background: var(--text);
    color: var(--bg);
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
  }

  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { color: rgba(255,251,247,0.6); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--accent3); }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-dot"></div>
    神秘网站
  </div>
  <ul>
    <li><a href="#">文章</a></li>
    <li><a href="#">关于</a></li>
    <li><a href="#">GitHub</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-text">
    <div class="hero-badge">✦ Personal Blog</div>
    <h1>慢慢试试<br><span class="highlight">找感觉</span></h1>
    <p>记录技术与生活的碎片，写给自己也写给路过的人。</p>
    <div class="btn-group">
      <a href="#" class="btn">开始阅读</a>
      <a href="#" class="btn btn-outline">关于我</a>
    </div>
  </div>
  <div class="hero-side">
    <div class="stat-card">
      <div class="stat-number">24</div>
      <div class="stat-label">篇文章</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">3</div>
      <div class="stat-label">个分类</div>
    </div>
  </div>
</div>

<div class="posts-section">
  <div class="section-header">
    <span class="section-title">最近文章</span>
    <div class="section-line"></div>
    <a href="#" class="view-all">全部 →</a>
  </div>
  <div class="post-list">
    <a href="#" class="post-item">
      <span class="post-num">01</span>
      <div>
        <div class="post-title">用 Astro 重建这个博客的过程记录</div>
        <div class="post-date">2026年4月</div>
      </div>
      <span class="post-tag">技术</span>
    </a>
    <a href="#" class="post-item">
      <span class="post-num">02</span>
      <div>
        <div class="post-title">关于把东西做完这件事</div>
        <div class="post-date">2026年3月</div>
      </div>
      <span class="post-tag">随笔</span>
    </a>
    <a href="#" class="post-item">
      <span class="post-num">03</span>
      <div>
        <div class="post-title">TypeScript 类型体操备忘录</div>
        <div class="post-date">2026年2月</div>
      </div>
      <span class="post-tag">技术</span>
    </a>
    <a href="#" class="post-item">
      <span class="post-num">04</span>
      <div>
        <div class="post-title">最近在听的几张专辑</div>
        <div class="post-date">2026年1月</div>
      </div>
      <span class="post-tag">生活</span>
    </a>
  </div>
</div>

<footer>
  <span>wokai.cc · 慢慢试试找感觉</span>
  <div class="footer-links">
    <a href="#">Twitter</a>
    <a href="#">GitHub</a>
    <a href="#">RSS</a>
  </div>
</footer>

</body>
</html>
