<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 1C — 宽松通透</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fffdf9;
    --text: #1e1a16;
    --text2: #9a8878;
    --accent: #b85c22;
    --warm: #f5e8d8;
    --border: #ecddd0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Noto Serif SC', serif;
    line-height: 1.8;
  }

  nav {
    padding: 2rem 6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: system-ui, sans-serif;
    color: var(--text2);
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2.5rem;
  }

  nav a {
    text-decoration: none;
    color: var(--text2);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    font-family: system-ui, sans-serif;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--accent); }

  /* Hero */
  .hero {
    max-width: 600px;
    margin: 4rem auto 6rem;
    padding: 0 6rem;
  }

  .hero-rule {
    width: 32px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 2.5rem;
  }

  .hero h1 {
    font-size: 2.5rem;
    font-weight: normal;
    line-height: 1.3;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero p {
    font-size: 1rem;
    color: var(--text2);
    margin-bottom: 2.5rem;
    font-family: system-ui, sans-serif;
    line-height: 1.9;
  }

  .hero-links {
    display: flex;
    gap: 2rem;
    font-family: system-ui, sans-serif;
    font-size: 0.85rem;
  }

  .hero-links a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
    transition: color 0.2s;
  }

  .hero-links a:hover { color: var(--accent); }

  .hero-links a.primary {
    color: var(--accent);
  }

  /* Posts */
  .posts {
    border-top: 1px solid var(--border);
    max-width: 600px;
    margin: 0 auto;
    padding: 4rem 6rem 6rem;
  }

  .posts-header {
    font-family: system-ui, sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 3rem;
  }

  .post-item {
    display: block;
    text-decoration: none;
    color: inherit;
    margin-bottom: 2.5rem;
    padding-left: 1.25rem;
    border-left: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .post-item:hover {
    border-color: var(--accent);
  }

  .post-item:hover .post-title { color: var(--accent); }

  .post-meta {
    font-family: system-ui, sans-serif;
    font-size: 0.75rem;
    color: var(--text2);
    letter-spacing: 0.05em;
    margin-bottom: 0.35rem;
  }

  .post-title {
    font-size: 1.1rem;
    line-height: 1.45;
    transition: color 0.2s;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 6rem;
    display: flex;
    justify-content: space-between;
    font-family: system-ui, sans-serif;
    font-size: 0.78rem;
    color: var(--text2);
  }

  footer a { color: var(--text2); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <div class="logo">wokai.cc</div>
  <ul>
    <li><a href="#">文章</a></li>
    <li><a href="#">关于</a></li>
    <li><a href="#">GitHub</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-rule"></div>
  <h1>慢慢试试，<br><em>找找感觉</em></h1>
  <p>记录技术与生活的碎片，写给自己也写给路过的人。</p>
  <div class="hero-links">
    <a href="#" class="primary">读最新文章 →</a>
    <a href="#">关于我</a>
  </div>
</div>

<div class="posts">
  <div class="posts-header">最近文章</div>

  <a href="#" class="post-item">
    <div class="post-meta">2026.04 · 技术</div>
    <div class="post-title">用 Astro 重建这个博客的过程记录</div>
  </a>
  <a href="#" class="post-item">
    <div class="post-meta">2026.03 · 随笔</div>
    <div class="post-title">关于把东西做完这件事</div>
  </a>
  <a href="#" class="post-item">
    <div class="post-meta">2026.02 · 技术</div>
    <div class="post-title">TypeScript 类型体操备忘录</div>
  </a>
  <a href="#" class="post-item">
    <div class="post-meta">2026.01 · 生活</div>
    <div class="post-title">最近在听的几张专辑</div>
  </a>
</div>

<footer>
  <span>慢慢试试找感觉</span>
  <span><a href="#">RSS</a> · <a href="#">Twitter</a></span>
</footer>

</body>
</html>
