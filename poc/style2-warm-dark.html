<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 2 — 暖棕深色</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #18120e;
    --bg2: #241a14;
    --bg3: #2e221a;
    --text: #f0e6d8;
    --text2: #a08878;
    --accent: #e8a060;
    --accent2: #c07840;
    --border: #3a2820;
    --glow: rgba(232, 160, 96, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    line-height: 1.7;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 3rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(24, 18, 14, 0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2rem;
  }

  nav a {
    text-decoration: none;
    color: var(--text2);
    font-size: 0.875rem;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--accent); }

  /* Hero */
  .hero {
    padding: 7rem 3rem 5rem;
    max-width: 800px;
    margin: 0 auto;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 4rem;
    left: -2rem;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .eyebrow-text {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .hero h1 {
    font-size: 3.5rem;
    line-height: 1.15;
    font-weight: 700;
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }

  .hero h1 span {
    color: var(--accent);
    display: block;
  }

  .hero p {
    font-size: 1rem;
    color: var(--text2);
    max-width: 480px;
    margin-bottom: 3rem;
    line-height: 1.8;
  }

  .btn-group { display: flex; gap: 1rem; align-items: center; }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.75rem;
    background: var(--accent);
    color: var(--bg);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 600;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .btn:hover {
    background: #f0b070;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(232, 160, 96, 0.3);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--bg3);
    color: var(--text);
    box-shadow: none;
  }

  /* Posts */
  section {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 3rem 4rem;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .view-all {
    font-size: 0.8rem;
    color: var(--text2);
    text-decoration: none;
    transition: color 0.2s;
  }

  .view-all:hover { color: var(--accent); }

  .post-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .post-card {
    background: var(--bg2);
    padding: 1.75rem;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
    display: block;
  }

  .post-card:hover { background: var(--bg3); }

  .card-tag {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.75rem;
  }

  .card-title {
    font-size: 0.975rem;
    line-height: 1.5;
    margin-bottom: 0.75rem;
    color: var(--text);
  }

  .card-date {
    font-size: 0.75rem;
    color: var(--text2);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text2);
    font-size: 0.8rem;
  }

  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { color: var(--text2); text-decoration: none; }
  .footer-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <div class="logo">wokai.cc</div>
  <ul>
    <li><a href="#">文章</a></li>
    <li><a href="#">关于</a></li>
    <li><a href="#">GitHub ↗</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-eyebrow">
    <div class="dot"></div>
    <span class="eyebrow-text">Personal Blog</span>
  </div>
  <h1>神秘网站<span>慢慢试试找感觉</span></h1>
  <p>记录技术与生活的碎片，写给自己也写给路过的人。</p>
  <div class="btn-group">
    <a href="#" class="btn">浏览文章</a>
    <a href="#" class="btn btn-ghost">关于我</a>
  </div>
</div>

<section>
  <div class="section-header">
    <span class="section-title">最近文章</span>
    <a href="#" class="view-all">全部 →</a>
  </div>
  <div class="post-grid">
    <a href="#" class="post-card">
      <div class="card-tag">技术</div>
      <div class="card-title">用 Astro 重建这个博客的过程记录</div>
      <div class="card-date">2026年4月</div>
    </a>
    <a href="#" class="post-card">
      <div class="card-tag">随笔</div>
      <div class="card-title">关于把东西做完这件事</div>
      <div class="card-date">2026年3月</div>
    </a>
    <a href="#" class="post-card">
      <div class="card-tag">技术</div>
      <div class="card-title">TypeScript 类型体操备忘录</div>
      <div class="card-date">2026年2月</div>
    </a>
    <a href="#" class="post-card">
      <div class="card-tag">生活</div>
      <div class="card-title">最近在听的几张专辑</div>
      <div class="card-date">2026年1月</div>
    </a>
  </div>
</section>

<footer>
  <span>© 2026 wokai.cc</span>
  <div class="footer-links">
    <a href="#">Twitter</a>
    <a href="#">GitHub</a>
    <a href="#">RSS</a>
  </div>
</footer>

</body>
</html>
