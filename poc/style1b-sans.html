<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 1B — 无衬线清爽版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf7f2;
    --bg2: #f3ede4;
    --text: #2c2420;
    --text2: #8a7060;
    --accent: #c0622a;
    --border: #e8ddd4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'PingFang SC', sans-serif;
    line-height: 1.7;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 4rem;
    background: var(--bg);
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2rem;
  }

  nav a {
    text-decoration: none;
    color: var(--text2);
    font-size: 0.875rem;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--accent); }

  .hero {
    max-width: 680px;
    margin: 0 auto;
    padding: 6rem 4rem 4rem;
  }

  .hero-label {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  .hero h1 {
    font-size: 2.75rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  .hero p {
    font-size: 1rem;
    color: var(--text2);
    line-height: 1.8;
    margin-bottom: 2.5rem;
    max-width: 440px;
  }

  .btn-row { display: flex; align-items: center; gap: 1.5rem; }

  .btn {
    display: inline-block;
    padding: 0.65rem 1.5rem;
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 2px;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }

  .link {
    font-size: 0.875rem;
    color: var(--text2);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .link:hover { color: var(--accent); border-color: var(--accent); }

  section {
    max-width: 680px;
    margin: 0 auto;
    padding: 1rem 4rem 5rem;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 1.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .post-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 2rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
  }

  .post-item:hover .post-title { color: var(--accent); }

  .post-left { display: flex; align-items: baseline; gap: 0.75rem; }

  .post-tag {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    background: var(--bg2);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .post-title {
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.15s;
    line-height: 1.4;
  }

  .post-date {
    font-size: 0.78rem;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  footer {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 4rem 3rem;
    color: var(--text2);
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
  }

  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { color: var(--text2); text-decoration: none; }
  .footer-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <div class="logo">神秘网站</div>
  <ul>
    <li><a href="#">文章</a></li>
    <li><a href="#">关于</a></li>
    <li><a href="#">GitHub</a></li>
  </ul>
</nav>

<div class="hero">
  <p class="hero-label">Personal Blog</p>
  <h1>慢慢试试，找找感觉</h1>
  <p>记录技术与生活的碎片，写给自己也写给路过的人。</p>
  <div class="btn-row">
    <a href="#" class="btn">浏览文章</a>
    <a href="#" class="link">关于我 →</a>
  </div>
</div>

<section>
  <div class="section-label">最近文章</div>
  <a href="#" class="post-item">
    <div class="post-left">
      <span class="post-tag">技术</span>
      <span class="post-title">用 Astro 重建这个博客的过程记录</span>
    </div>
    <span class="post-date">2026.04</span>
  </a>
  <a href="#" class="post-item">
    <div class="post-left">
      <span class="post-tag">随笔</span>
      <span class="post-title">关于把东西做完这件事</span>
    </div>
    <span class="post-date">2026.03</span>
  </a>
  <a href="#" class="post-item">
    <div class="post-left">
      <span class="post-tag">技术</span>
      <span class="post-title">TypeScript 类型体操备忘录</span>
    </div>
    <span class="post-date">2026.02</span>
  </a>
  <a href="#" class="post-item">
    <div class="post-left">
      <span class="post-tag">生活</span>
      <span class="post-title">最近在听的几张专辑</span>
    </div>
    <span class="post-date">2026.01</span>
  </a>
</section>

<footer>
  <span>wokai.cc</span>
  <div class="footer-links">
    <a href="#">RSS</a>
    <a href="#">Twitter</a>
  </div>
</footer>

</body>
</html>
